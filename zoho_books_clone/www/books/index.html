<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Books — Accounting</title>
<meta name="csrf-token" content="{{ frappe.session.csrf_token }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/zoho_books_clone/css/books.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;overflow:hidden;background:#f4f6fa}
#books-app{height:100vh;width:100vw;display:flex}
/* Hide Frappe's own navbar/sidebar on this page */
.navbar,.page-head,.layout-side-section,.page-container>.container{display:none!important}
.page-content{padding:0!important;margin:0!important;height:100vh!important}
</style>
</head>
<body>
<div id="books-app"></div>
<script>
// Bootstrap session data from Jinja context — no extra fetch needed
window.frappe = window.frappe || {};
window.frappe.csrf_token   = "{{ frappe.session.csrf_token }}";
window.frappe.session       = window.frappe.session || {};
window.frappe.session.user  = "{{ frappe.session.user }}";
window.frappe.session.user_fullname = "{{ frappe.utils.get_fullname(frappe.session.user) }}";
window.frappe.boot          = { sysdefaults: { company: "" } };
window.__booksCompany       = "{{ frappe.db.get_single_value('Books Settings', 'default_company') or '' }}";
window.frappe.boot.sysdefaults.company = window.__booksCompany;
</script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
<script src="/assets/zoho_books_clone/js/books.js"></script>
</body>
</html>
